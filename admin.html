<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Site — Roulstone Reed</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="login-screen" class="login-screen">
    <form id="login-form" class="login-box">
      <img src="logo.svg" alt="" width="40" height="40" />
      <h1>Site editor</h1>
      <p>Sign in to update text and images.</p>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" class="btn btn-dark">Sign in</button>
      <p id="login-error" class="error" hidden>Incorrect password</p>
    </form>
  </div>

  <div id="editor" class="editor" hidden>
    <header class="editor-header">
      <div>
        <h1>Site editor</h1>
        <p>Edit content below, then save. Run via <strong>start.bat</strong> to save to disk.</p>
      </div>
      <div class="editor-actions">
        <a href="index.html" target="_blank" class="btn btn-ghost">View site</a>
        <button type="button" id="btn-download" class="btn btn-ghost">Download JSON</button>
        <button type="button" id="btn-save" class="btn btn-dark">Save changes</button>
        <button type="button" id="btn-logout" class="btn btn-ghost">Sign out</button>
      </div>
    </header>
    <p id="save-status" class="save-status" role="status"></p>
    <form id="content-form" class="content-form"></form>
  </div>

  <script src="admin.js"></script>
</body>
</html>
